<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download My App</title>
    <style>
        /* Reset some basic styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Styling the body */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            color: #333;
        }

        /* Centered container */
        .container {
            text-align: center;
            background: #fff;
            padding: 2em;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        /* Header text */
        h1 {
            color: #4CAF50;
            margin-bottom: 0.5em;
        }

        /* Subtitle text */
        p {
            font-size: 1.1em;
            margin-bottom: 2em;
            color: #666;
        }

        /* Download button styling */
        .download-btn {
            display: inline-block;
            padding: 1em 2em;
            background-color: #4CAF50;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            transition: background-color 0.3s ease;
        }

        /* Button hover effect */
        .download-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Get Our App</h1>
        <p>Click the button below to download the app to your device:</p>
        <a href="c:\Users\markl\OneDrive\Documents\RICECARE\RiceCare.apk" download class="download-btn">Download APK</a>
    </div>
</body>
</html>
